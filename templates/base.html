<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ArsForte{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
  {% if messages %}
  <div class="messages">
    {% for message in messages %}
    <div class="message message-{{ message.tags }}" id="message-{{ forloop.counter }}">
      <span class="message-content">{{ message }}</span>
      <button class="message-close" onclick="closeMessage('message-{{ forloop.counter }}')">&times;</button>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  {% block content %}{% endblock %}
  
  <script src="{% static 'js/messeage.js' %}"></script>
</body>
</html>
